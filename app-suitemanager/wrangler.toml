name = "suitemanager-portal"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# D1: metadata (users, properties, documents, resources, audit_events)
# Create with:  wrangler d1 create suitemanager-portal
# Then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "suitemanager-portal"
database_id = "a05dcf90-e157-4e4b-bfb1-b34e2e4737d8"

# R2: file blobs (documents/ and resources/ prefixes)
# Create with:  wrangler r2 bucket create suitemanager-portal-files
[[r2_buckets]]
binding = "FILES"
bucket_name = "suitemanager-portal-files"

# Plain vars (non-secret).
[vars]
MAX_UPLOAD_BYTES = "26214400"          # 25 MB
APP_ORIGIN = "https://app.suitemanagerllc.com"

# Microsoft Graph email (Suite Manager M365 tenant). IDs are not secrets —
# they appear in every OAuth request. The client secret is set separately.
GRAPH_TENANT_ID = "4a2d9fd6-fe9f-4c54-a75a-bb8f78106324"
GRAPH_CLIENT_ID = "3a8c7ce5-59ca-4bed-92aa-c6ed7be6e0f3"
GRAPH_SENDER_USER_ID = "portal@suitemanagerllc.com"

# Secrets — set in the Cloudflare Pages dashboard (Settings → Variables & secrets):
#   SESSION_SECRET
#   GRAPH_CLIENT_SECRET
